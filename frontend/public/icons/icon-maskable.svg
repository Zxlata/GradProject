<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed background – maskable icons must fill the entire canvas -->
  <rect x="0" y="0" width="512" height="512" fill="url(#bg)"/>

  <!--
    Safe zone: the inner 80% circle (radius ~205 px centred at 256,256).
    All meaningful art is kept inside it so Android squircle masking looks clean.
    Scale the brain design down to ~72% and centre it at (256, 256).
  -->

  <!-- Left hemisphere -->
  <path d="M246 178 C246 178 174 178 150 230 C132 268 142 310 166 334 C184 350 212 358 232 353 C243 350 246 343 246 332"
        fill="none" stroke="#ffffff" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right hemisphere -->
  <path d="M266 178 C266 178 338 178 362 230 C380 268 370 310 346 334 C328 350 300 358 280 353 C269 350 266 343 266 332"
        fill="none" stroke="#ffffff" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Centre line -->
  <line x1="256" y1="164" x2="256" y2="348" stroke="#ffffff" stroke-width="18" stroke-linecap="round"/>

  <!-- Left fold -->
  <path d="M210 234 C184 252 182 300 206 322"
        fill="none" stroke="#ffffff" stroke-width="16" stroke-linecap="round"/>

  <!-- Right fold -->
  <path d="M302 234 C328 252 330 300 306 322"
        fill="none" stroke="#ffffff" stroke-width="16" stroke-linecap="round"/>

  <!-- Neural dots -->
  <circle cx="256" cy="160" r="13" fill="#ffffff"/>
  <circle cx="256" cy="352" r="11" fill="#ffffff"/>
  <circle cx="138" cy="254" r="11" fill="#ffffff" fill-opacity="0.85"/>
  <circle cx="374" cy="254" r="11" fill="#ffffff" fill-opacity="0.85"/>
</svg>
