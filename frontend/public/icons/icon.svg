  </defs>

  <!-- Background rounded square -->
  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- ── Brain icon – left hemisphere (semicircle) ── -->
  <path d="M246 148 C246 148 158 148 130 208 C110 250 120 298 148 324 C168 342 200 350 222 345 C234 342 246 334 246 322"
