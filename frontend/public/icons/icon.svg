  <line x1="256" y1="136" x2="256" y2="336" stroke="#ffffff" stroke-width="20" stroke-linecap="round"/>

  <!-- ── Left hemisphere fold line ── -->
  <path d="M196 210 C168 230 166 282 192 306"
        fill="none" stroke="#ffffff" stroke-width="18" stroke-linecap="round"/>

