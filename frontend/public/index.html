<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <!-- ── PWA manifest ── -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- ── Theme ── -->
    <meta name="theme-color" content="#6366f1" />
    <meta name="color-scheme" content="light dark" />

    <!-- ── Primary SEO ── -->
    <title>AI Interview Simulator</title>
    <meta name="description"
          content="AI-powered mock interview platform with CV analysis, multimodal feedback, speech analysis, facial emotion detection, and interview coaching." />
    <meta name="keywords"
          content="AI interview, mock interview, interview practice, CV analysis, speech analysis, interview coaching" />
    <meta name="author" content="AI Interview Simulator" />

    <!-- ── Open Graph (social sharing) ── -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="AI Interview Simulator" />
    <meta property="og:description" content="Master your interview skills with AI-powered practice sessions, real-time feedback, and multimodal coaching." />
    <meta property="og:image"       content="%PUBLIC_URL%/icons/icon.svg" />
    <meta property="og:site_name"   content="AI Interview Simulator" />

    <!-- ── Twitter Card ── -->
    <meta name="twitter:card"        content="summary" />
    <meta name="twitter:title"       content="AI Interview Simulator" />
    <meta name="twitter:description" content="Master your interview skills with AI coaching." />
    <meta name="twitter:image"       content="%PUBLIC_URL%/icons/icon.svg" />

    <!-- ── Apple PWA ── -->
    <meta name="apple-mobile-web-app-capable"          content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title"            content="AI Interview" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icons/icon.svg" />

    <!-- ── Microsoft tiles ── -->
    <meta name="msapplication-TileColor"   content="#6366f1" />
    <meta name="msapplication-TileImage"   content="%PUBLIC_URL%/icons/icon.svg" />
    <meta name="msapplication-config"      content="none" />

    <!-- ── Favicon (SVG — supported by all modern browsers) ── -->
    <link rel="icon"          type="image/svg+xml" href="%PUBLIC_URL%/icons/icon.svg" />
    <link rel="shortcut icon" type="image/svg+xml" href="%PUBLIC_URL%/icons/icon.svg" />

    <!-- ── Bootstrap Icons CDN ── -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" />

    <!-- ── Preconnect for faster CDN loading ── -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  </head>
  <body>
    <noscript>
      You need to enable JavaScript to run the AI Interview Simulator.
    </noscript>
    <div id="root"></div>
  </body>
</html>
